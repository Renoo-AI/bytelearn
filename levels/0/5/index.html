<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLab | World 0 Level 5</title>
    <link rel="icon" type="image/png" href="../../../assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f5f6fb;--text:#1d1d1f;--primary:#4546d7;--secondary:#86868b;--border:#e2e8f0;--font-main:'Be Vietnam Pro',sans-serif;--font-display:'Plus Jakarta Sans',sans-serif}.dark{--bg:#0a0a0f;--text:#e2e8f0;--border:#1e293b;--secondary:#94a3b8}
        body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-main);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        #header-nav{position:fixed;top:0;left:0;right:0;height:80px;padding:0 60px;display:flex;justify-content:space-between;align-items:center;z-index:1000;background:rgba(245,246,251,0.8);backdrop-filter:blur(10px)}.dark #header-nav{background:rgba(10,10,15,0.92)!important}
        .logo-group{display:flex;align-items:center;gap:12px;flex-shrink:0}
        .app-logo{width:32px;height:32px;object-fit:contain}
        .progress-box{display:flex;align-items:center;gap:12px;flex-grow:1;max-width:300px;margin:0 40px}
        .progress-rail{flex-grow:1;height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden}
        .progress-fill{height:100%;background:var(--primary);width:0%;transition:width 1s cubic-bezier(0.65,0,0.35,1)}
        .progress-text{font-size:.85rem;font-weight:800;color:var(--secondary);min-width:30px}
        .btn-quit{color:var(--secondary);font-weight:700;font-size:1rem;transition:color .2s;cursor:pointer;border:none;background:none}
        .btn-quit:hover{color:#f43f5e}
        .card{background:white;width:100%;max-width:440px;padding:50px 40px;border-radius:48px;box-shadow:0 10px 40px rgba(0,0,0,0.02);text-align:center;opacity:0;transform:translateY(20px);transition:all .8s cubic-bezier(0.2,1,0.2,1)}
        .card-title{font-family:var(--font-display);font-size:1.5rem;font-weight:800;margin-bottom:16px}
        .card-sub{color:var(--secondary);margin-bottom:32px;line-height:1.6}
        .btn-main{background:var(--primary);color:white;width:100%;padding:20px;border-radius:20px;font-weight:800;font-size:1.2rem;cursor:pointer;border:none;transition:all .2s}
        .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(69,70,215,0.25)}
        #transition-screen{position:fixed;inset:0;background:var(--primary);z-index:3000;opacity:1;pointer-events:none;transition:opacity .6s ease}
        #story-overlay{position:fixed;inset:0;background:white;z-index:1500;display:flex;justify-content:center;align-items:center;transition:opacity .5s ease}
        .assistant-container{position:fixed;top:120px;right:60px;display:flex;flex-direction:column;align-items:flex-end;gap:12px;z-index:1000;max-width:280px;opacity:0;transform:translateY(10px);transition:all .9s cubic-bezier(0.34,1.56,0.64,1)}
        .assistant-container.victory-move{top:50%!important;right:50%!important;transform:translate(50%,-50%)scale(1.1)!important;align-items:center;max-width:440px}
        .bubble{background:white;padding:20px 24px;border-radius:28px;box-shadow:0 20px 50px rgba(0,0,0,0.06);text-align:right;position:relative;opacity:1;transform:scale(1);transition:opacity .4s ease,transform .4s ease}
        .bubble.hidden-msg{opacity:0;transform:scale(0.95)translateY(10px);pointer-events:none}
        .assistant-container.victory-move .bubble{text-align:center;padding:32px}
        .bubble::after{content:'';position:absolute;bottom:-8px;right:24px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid white}
        .bubble-text{font-size:1.1rem;font-weight:600;line-height:1.5;color:#334155}
        .mascot-img{width:72px;height:72px;object-fit:contain;transition:all .6s cubic-bezier(0.175,0.885,0.32,1.275)}
        .assistant-container.victory-move .mascot-img{width:150px;height:150px}
    </style>
</head>
<body>
    <div id="transition-screen"></div>
    <div id="story-overlay">
        <div class="text-center max-w-md p-5">
            <img src="../../../assets/byte-hello.png" class="w-24 mx-auto mb-8">
            <h1 class="text-3xl font-extrabold mb-4 tracking-tight" style="font-family:var(--font-display)">World 0 · Level 5</h1>
            <p class="text-lg text-slate-500 mb-10 font-medium leading-relaxed">Every interface is a negotiation. Find the loophole.</p>
            <button onclick="startLevel()" class="bg-[#4546d7] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">Start</button>
        </div>
    </div>
    <header id="header-nav" class="opacity-0">
        <div class="logo-group">
            <img src="../../../assets/logo.png" class="app-logo">
            <span class="font-extrabold text-2xl tracking-tighter">ByteLab</span>
        </div>
        <div class="progress-box">
            <div class="progress-rail"><div id="progress-fill-bar" class="progress-fill"></div></div>
            <span id="progress-text-val" class="progress-text">5/5</span>
        </div>
        <button onclick="quit()" class="btn-quit">Quit</button>
    </header>
    <main class="w-full flex flex-col items-center justify-center">
        <div id="assistant" class="assistant-container">
            <div id="bubble-node" class="bubble hidden-msg"><p class="bubble-text" id="talk-text"></p></div>
            <img id="mascot" src="../../../assets/byte-hello.png" class="mascot-img">
        </div>
        <div id="card" class="card">
            <div class="card-title">Challenge 0.5</div>
            <p class="card-sub">Inspect the elements around you. The answer is hidden in the code.</p>
            <button class="btn-main" id="btn-check">Verify</button>
        </div>
    </main>
    <script>
        const TRANS=document.getElementById('transition-screen'),STORY=document.getElementById('story-overlay'),HEAD=document.getElementById('header-nav'),ASST=document.getElementById('assistant'),BUB=document.getElementById('bubble-node'),TALK=document.getElementById('talk-text')
        let t,ht,hasWon=false
        function speak(txt,p){clearTimeout(t);TALK.innerText=txt;BUB.classList.remove('hidden-msg');if(!p)t=setTimeout(()=>BUB.classList.add('hidden-msg'),6000)}
        window.onload=()=>setTimeout(()=>TRANS.style.opacity='0',500)
        function startLevel(){STORY.style.display='none';HEAD.classList.replace('opacity-0','opacity-100');ASST.style.opacity='1';ASST.style.transform='translateY(0)';document.getElementById('card').style.opacity='1';document.getElementById('card').style.transform='translateY(0)';speak('Look closely. The answer is in the code.')}
	        document.getElementById('btn-check').onclick=()=>{if(!hasWon){hasWon=true;const s=JSON.parse(localStorage.getItem('bytelab_attack_0')||'[]');if(!s.includes(5)){s.push(5);localStorage.setItem('bytelab_attack_0',JSON.stringify(s))}speak('Tutorial complete! Advancing to World 1...',true);setTimeout(()=>{TRANS.style.opacity='1';setTimeout(()=>window.location.href='../../1/1/index.html',600)},2000)}}
	        function quit(){TRANS.style.opacity='1';setTimeout(()=>window.location.href = '../../../game.html',600)}
    </script>
</body>
</html>
