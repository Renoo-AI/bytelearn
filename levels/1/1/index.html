<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteLab | PayPal 1.1</title>
<link rel="icon" type="image/png" href="../../../assets/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../../../assets/bytelab.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fb;--text:#1d1d1f;--primary:#0070ba;--secondary:#86868b;--border:#e2e8f0;--font:'Plus Jakarta Sans',sans-serif}.dark{--bg:#0a0a0f;--text:#e2e8f0;--border:#1e293b;--secondary:#94a3b8}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#nav{position:fixed;top:0;left:0;right:0;height:64px;padding:0 32px;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(245,246,251,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.dark #nav{background:rgba(10,10,15,0.92)!important}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem}.logo img{width:26px;height:26px;object-fit:contain}
.btn-quit{color:var(--secondary);font-weight:700;font-size:.8rem;cursor:pointer;border:none;background:none;padding:8px 12px;border-radius:8px}.btn-quit:hover{color:#f43f5e}
.progress-rail{width:80px;height:5px;background:var(--border);border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:var(--primary);width:0%;transition:width .5s}
.card{background:white;max-width:420px;width:90%;padding:36px 28px;border-radius:28px;box-shadow:0 10px 40px rgba(0,0,0,0.04);text-align:center;opacity:0;transform:translateY(20px);transition:all .6s ease}.dark .card{background:#13131a}
.card-title{font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--secondary);margin-bottom:24px}
.amount-display{font-size:3rem;font-weight:900;letter-spacing:-2px;color:var(--primary);margin-bottom:8px}
.amount-label{font-size:.8rem;color:var(--secondary);margin-bottom:24px}
.btn-send{background:var(--primary);color:white;width:100%;padding:16px;border-radius:16px;font-weight:800;font-size:1rem;border:none;cursor:pointer;transition:all .2s}.btn-send:hover{transform:translateY(-2px)}
#transition{position:fixed;inset:0;background:var(--primary);z-index:999;opacity:1;transition:opacity .4s;pointer-events:none}
#story{position:fixed;inset:0;background:white;z-index:200;display:flex;align-items:center;justify-content:center}.dark #story{background:#0d0d14}
</style>
</head>
<body>
<div id="transition"></div>
<div id="story">
  <div class="max-w-md text-center p-6">
    <img src="../../../assets/byte-hello.png" class="w-20 mx-auto mb-6" alt="Byte">
    <h1 class="text-3xl font-extrabold mb-3">Amount Swap</h1>
    <p class="text-slate-500 mb-8 font-medium leading-relaxed">The transfer screen shows $5000. But the real amount is stored somewhere in the element itself. Find it and change it.</p>
    <button onclick="startLevel()" class="bg-[#0070ba] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">Open Transfer</button>
  </div>
</div>
<header id="nav" style="opacity:0">
  <div class="logo"><img src="../../../assets/logo.png" alt="ByteLab"><span>PayPal</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="progress-rail"><div id="progress-bar" class="progress-fill"></div></div>
    <button onclick="quit()" class="btn-quit">Quit</button>
  </div>
</header>
<main style="flex:1;display:flex;align-items:center;justify-content:center;margin-top:64px">
  <div class="card" id="card">
    <div class="card-title">Transfer Funds</div>
    <p class="amount-label">Sending Amount</p>
    <div class="amount-display" id="amount-text">$5,000.00</div>
    <p class="amount-label">To: savings@personal</p>
    <button class="btn-send" id="send-btn" data-amount="5000" onclick="sendMoney()">Send Transfer</button>
  </div>
</main>
<script>
const TRANS=document.getElementById('transition'),STORY=document.getElementById('story');
let hasWon=false;
window.onload=()=>setTimeout(()=>TRANS.style.opacity='0',400);
function startLevel(){
  STORY.style.display='none';document.getElementById('nav').style.opacity='1';
  document.getElementById('card').style.opacity='1';document.getElementById('card').style.transform='translateY(0)';
  if(typeof ByteLab!=='undefined')ByteLab.initByteAssistant(1,1,'attack');
}
function sendMoney(){
  if(hasWon)return;
  const btn=document.getElementById('send-btn');
  const raw=btn.getAttribute('data-amount');
  const amt=parseFloat(raw);
  if(amt<=0){
    hasWon=true;
    document.getElementById('amount-text').innerText='$'+amt.toFixed(2);
    document.getElementById('amount-text').style.color='#10b981';
    document.getElementById('amount-text').style.fontSize='4rem';
    ByteLab.saveSolved(1,1,'attack');
    document.getElementById('progress-bar').style.width='20%';
    ByteLab.showVictory({
      title:'AMOUNT SWAPPED',subtitle:'You sent $'+amt.toFixed(2)+' but claimed $5,000!',xp:15,
      onNext:()=>{TRANS.style.opacity='1';setTimeout(()=>location.href='../2/index.html',500)},
      onStay:()=>ByteLab.removeOverlay('victory')
    });
  }else{
    btn.style.background='#f43f5e';btn.innerText='Amount Verified: $'+amt.toFixed(2);
    setTimeout(()=>{btn.style.background='var(--primary)';btn.innerText='Send Transfer'},2000);
  }
}
function quit(){TRANS.style.opacity='1';setTimeout(()=>location.href='../../../game.html',500)}
</script>
</body>
</html>
