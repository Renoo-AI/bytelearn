<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteLab | PayPal 1.5</title>
<link rel="icon" type="image/png" href="../../../assets/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../../../assets/bytelab.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fb;--text:#1d1d1f;--primary:#0070ba;--secondary:#86868b;--border:#e2e8f0;--font:'Plus Jakarta Sans',sans-serif}.dark{--bg:#0a0a0f;--text:#e2e8f0;--border:#1e293b;--secondary:#94a3b8}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#nav{position:fixed;top:0;left:0;right:0;height:64px;padding:0 32px;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(245,246,251,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.dark #nav{background:rgba(10,10,15,0.92)!important}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem}.logo img{width:26px;height:26px;object-fit:contain}
.btn-quit{color:var(--secondary);font-weight:700;font-size:.8rem;cursor:pointer;border:none;background:none;padding:8px 12px;border-radius:8px}.btn-quit:hover{color:#f43f5e}
.card{background:white;max-width:420px;width:90%;padding:36px 28px;border-radius:28px;box-shadow:0 10px 40px rgba(0,0,0,0.04);text-align:center;opacity:0;transform:translateY(20px);transition:all .6s ease}.dark .card{background:#13131a}
.card-title{font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--secondary);margin-bottom:24px}
.sig-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.sig-name{font-weight:700;font-size:.85rem}.sig-status{font-weight:800;font-size:.75rem;padding:4px 12px;border-radius:99px}
.sig-pending{background:#fef3c7;color:#d97706}.sig-approved{background:#d1fae5;color:#059669}
.btn-exec{background:var(--primary);color:white;width:100%;padding:16px;border-radius:16px;font-weight:800;font-size:1rem;border:none;cursor:pointer;transition:all .2s}.btn-exec:hover:not(:disabled){transform:translateY(-2px)}.btn-exec:disabled{opacity:.4;cursor:not-allowed}
#transition{position:fixed;inset:0;background:var(--primary);z-index:999;opacity:1;transition:opacity .4s;pointer-events:none}
#story{position:fixed;inset:0;background:white;z-index:200;display:flex;align-items:center;justify-content:center}.dark #story{background:#0d0d14}
</style>
</head>
<body>
<div id="transition"></div>
<div id="story">
  <div class="max-w-md text-center p-6">
    <img src="../../../assets/byte-hello.png" class="w-20 mx-auto mb-6" alt="Byte">
    <h1 class="text-3xl font-extrabold mb-3">Approval Override</h1>
    <p class="text-slate-500 mb-8 font-medium leading-relaxed">This transfer needs 3 signatures. The approval status is checked from localStorage. Open the Console and set all approvals to true.</p>
    <button onclick="startLevel()" class="bg-[#0070ba] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">Open Transfer</button>
  </div>
</div>
<header id="nav" style="opacity:0">
  <div class="logo"><img src="../../../assets/logo.png" alt="ByteLab"><span>PayPal</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="progress-rail" style="width:80px;height:5px;background:var(--border);border-radius:99px;overflow:hidden"><div id="progress-bar" style="height:100%;background:var(--primary);width:0%;transition:width .5s"></div></div>
    <button onclick="quit()" class="btn-quit">Quit</button>
  </div>
</header>
<main style="flex:1;display:flex;align-items:center;justify-content:center;margin-top:64px">
  <div class="card" id="card">
    <div class="card-title">Multi-Signature Transfer</div>
    <p style="color:var(--secondary);font-size:.9rem;margin-bottom:4px">$12,500.00 to Vendor Inc.</p>
    <p style="font-weight:800;font-size:.7rem;color:var(--secondary);margin-bottom:16px">Required: 3 of 3 approvals</p>
    <div id="sig-list">
      <div class="sig-row"><span class="sig-name">CFO Approval</span><span class="sig-status sig-pending" id="sig-cfo">PENDING</span></div>
      <div class="sig-row"><span class="sig-name">CTO Approval</span><span class="sig-status sig-pending" id="sig-cto">PENDING</span></div>
      <div class="sig-row"><span class="sig-name">CEO Approval</span><span class="sig-status sig-pending" id="sig-ceo">PENDING</span></div>
    </div>
    <button class="btn-exec" id="exec-btn" disabled onclick="execute()">Execute Transfer</button>
  </div>
</main>
<script>
const TRANS=document.getElementById('transition'),STORY=document.getElementById('story');
let hasWon=false;
// Init approvals in localStorage
localStorage.setItem('sig_cfo','false');localStorage.setItem('sig_cto','false');localStorage.setItem('sig_ceo','false');
window.onload=()=>setTimeout(()=>TRANS.style.opacity='0',400);
function checkApprovals(){
  var cfo=localStorage.getItem('sig_cfo')==='true',cto=localStorage.getItem('sig_cto')==='true',ceo=localStorage.getItem('sig_ceo')==='true';
  document.getElementById('sig-cfo').className='sig-status '+(cfo?'sig-approved':'sig-pending');document.getElementById('sig-cfo').innerText=cfo?'APPROVED':'PENDING';
  document.getElementById('sig-cto').className='sig-status '+(cto?'sig-approved':'sig-pending');document.getElementById('sig-cto').innerText=cto?'APPROVED':'PENDING';
  document.getElementById('sig-ceo').className='sig-status '+(ceo?'sig-approved':'sig-pending');document.getElementById('sig-ceo').innerText=ceo?'APPROVED':'PENDING';
  document.getElementById('exec-btn').disabled=!(cfo&&cto&&ceo);
}
function startLevel(){STORY.style.display='none';document.getElementById('nav').style.opacity='1';document.getElementById('card').style.opacity='1';document.getElementById('card').style.transform='translateY(0)';checkApprovals();if(typeof ByteLab!=='undefined')ByteLab.initByteAssistant(1,5,'attack')}
function execute(){
  if(hasWon)return;
  var cfo=localStorage.getItem('sig_cfo')==='true',cto=localStorage.getItem('sig_cto')==='true',ceo=localStorage.getItem('sig_ceo')==='true';
  if(cfo&&cto&&ceo){hasWon=true;ByteLab.saveSolved(1,5,'attack');document.getElementById('progress-bar').style.width='100%';ByteLab.showVictory({title:'APPROVAL OVERRIDDEN',subtitle:'All 3 signatures approved! $12,500 transferred.',xp:20,onNext:function(){TRANS.style.opacity='1';setTimeout(function(){location.href='../../2/1/index.html'},500)},onStay:function(){ByteLab.removeOverlay('victory')}})}
}
setInterval(checkApprovals,600);
function quit(){TRANS.style.opacity='1';setTimeout(function(){location.href='../../../game.html'},500)}
</script>
</body>
</html>
