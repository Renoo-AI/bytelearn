<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteLab | PayPal 1.2</title>
<link rel="icon" type="image/png" href="../../../assets/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../../../assets/bytelab.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6fb;--text:#1d1d1f;--primary:#0070ba;--secondary:#86868b;--border:#e2e8f0;--font:'Plus Jakarta Sans',sans-serif}.dark{--bg:#0a0a0f;--text:#e2e8f0;--border:#1e293b;--secondary:#94a3b8}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
#nav{position:fixed;top:0;left:0;right:0;height:64px;padding:0 32px;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(245,246,251,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.dark #nav{background:rgba(10,10,15,0.92)!important}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1rem}.logo img{width:26px;height:26px;object-fit:contain}
.btn-quit{color:var(--secondary);font-weight:700;font-size:.8rem;cursor:pointer;border:none;background:none;padding:8px 12px;border-radius:8px}.btn-quit:hover{color:#f43f5e}
.card{background:white;max-width:420px;width:90%;padding:36px 28px;border-radius:28px;box-shadow:0 10px 40px rgba(0,0,0,0.04);text-align:center;opacity:0;transform:translateY(20px);transition:all .6s ease}.dark .card{background:#13131a}
.card-title{font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--secondary);margin-bottom:24px}
.rate-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.rate-label{font-weight:700;font-size:.9rem}.rate-val{font-weight:800;color:var(--primary);font-size:1.1rem}
select{width:100%;padding:14px;border-radius:14px;border:1px solid var(--border);font-weight:700;font-size:.95rem;background:var(--bg);color:var(--text);margin:16px 0}
.btn-convert{background:var(--primary);color:white;width:100%;padding:16px;border-radius:16px;font-weight:800;font-size:1rem;border:none;cursor:pointer;transition:all .2s}.btn-convert:hover{transform:translateY(-2px)}
#transition{position:fixed;inset:0;background:var(--primary);z-index:999;opacity:1;transition:opacity .4s;pointer-events:none}
#story{position:fixed;inset:0;background:white;z-index:200;display:flex;align-items:center;justify-content:center}.dark #story{background:#0d0d14}
</style>
</head>
<body>
<div id="transition"></div>
<div id="story">
  <div class="max-w-md text-center p-6">
    <img src="../../../assets/byte-hello.png" class="w-20 mx-auto mb-6" alt="Byte">
    <h1 class="text-3xl font-extrabold mb-3">Currency Inject</h1>
    <p class="text-slate-500 mb-8 font-medium leading-relaxed">Exchange rates are fixed. But the currency options are just HTML. Inject a new option with rate 0.00 to bypass all conversion fees.</p>
    <button onclick="startLevel()" class="bg-[#0070ba] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">Open Exchange</button>
  </div>
</div>
<header id="nav" style="opacity:0">
  <div class="logo"><img src="../../../assets/logo.png" alt="ByteLab"><span>PayPal</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="progress-rail" style="width:80px;height:5px;background:var(--border);border-radius:99px;overflow:hidden"><div id="progress-bar" style="height:100%;background:var(--primary);width:0%;transition:width .5s"></div></div>
    <button onclick="quit()" class="btn-quit">Quit</button>
  </div>
</header>
<main style="flex:1;display:flex;align-items:center;justify-content:center;margin-top:64px">
  <div class="card" id="card">
    <div class="card-title">Currency Exchange</div>
    <div class="rate-row"><span>USD to EUR</span><span class="rate-val">0.92</span></div>
    <div class="rate-row"><span>USD to GBP</span><span class="rate-val">0.79</span></div>
    <div class="rate-row"><span>USD to JPY</span><span class="rate-val">149.50</span></div>
    <p style="color:var(--secondary);font-size:.8rem;margin:16px 0">Amount: $100.00</p>
    <select id="currency-select">
      <option value="0.92">EUR (0.92)</option>
      <option value="0.79">GBP (0.79)</option>
      <option value="149.50">JPY (149.50)</option>
    </select>
    <button class="btn-convert" onclick="convert()">Convert Now</button>
  </div>
</main>
<script>
const TRANS=document.getElementById('transition'),STORY=document.getElementById('story');
let hasWon=false;
window.onload=()=>setTimeout(()=>TRANS.style.opacity='0',400);
function startLevel(){STORY.style.display='none';document.getElementById('nav').style.opacity='1';document.getElementById('card').style.opacity='1';document.getElementById('card').style.transform='translateY(0)';if(typeof ByteLab!=='undefined')ByteLab.initByteAssistant(1,2,'attack')}
function convert(){
  if(hasWon)return;
  var sel=document.getElementById('currency-select'),rate=parseFloat(sel.value);
  if(rate===0){hasWon=true;ByteLab.saveSolved(1,2,'attack');document.getElementById('progress-bar').style.width='40%';ByteLab.showVictory({title:'FEE BYPASSED',subtitle:'Zero-rate currency injected! $100 converted with no fees.',xp:15,onNext:function(){TRANS.style.opacity='1';setTimeout(function(){location.href='../3/index.html'},500)},onStay:function(){ByteLab.removeOverlay('victory')}})}
  else{alert('Converted: $100.00 to '+(100*rate).toFixed(2)+' (rate: '+rate+')')}
}
function quit(){TRANS.style.opacity='1';setTimeout(function(){location.href='../../../game.html'},500)}
</script>
</body>
</html>
