<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteLab | Discovery 0.2</title>
    <link rel="icon" type="image/png" href="../../assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f6fb;
            --text: #1d1d1f;
            --primary: #4546d7;
            --secondary: #86868b;
            --border: #e2e8f0;
            --font-main: 'Be Vietnam Pro', sans-serif;
            --font-display: 'Plus Jakarta Sans', sans-serif;
        }
.dark{--bg:#0a0a0f;--text:#e2e8f0;--border:#1e293b;--secondary:#94a3b8}

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- TOP BAR --- */
        #header-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(245, 246, 251, 0.8);
            backdrop-filter: blur(10px);
        }.dark #header-nav{background:rgba(10,10,15,0.92)!important;border-bottom:1px solid var(--border)}

        .logo-group { display: flex; align-items: center; gap: 12px; }
        .app-logo { width: 32px; height: 32px; object-fit: contain; }

        .progress-box {
            display: flex; align-items: center; gap: 12px;
            flex-grow: 1; max-width: 300px; margin: 0 40px;
        }

        .progress-rail {
            flex-grow: 1; height: 6px; background: #e2e8f0; border-radius: 99px; overflow: hidden;
        }

        .progress-fill {
            height: 100%; background: var(--primary); width: 20%;
            transition: width 1s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .progress-text { font-size: 0.85rem; font-weight: 800; color: var(--secondary); }

        .btn-quit { color: var(--secondary); font-weight: 700; font-size: 1rem; transition: color 0.2s; }
        .btn-quit:hover { color: #f43f5e; }

        /* --- ASSISTANT HUD --- */
        .assistant-container {
            position: fixed; top: 120px; right: 60px;
            display: flex; flex-direction: column; align-items: flex-end;
            gap: 12px; z-index: 1000; max-width: 280px; opacity: 0;
            transform: translateY(10px);
            transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .assistant-container.victory-move {
            top: 50% !important; right: 50% !important;
            transform: translate(50%, -50%) scale(1.1) !important;
            align-items: center; max-width: 440px;
        }

        .bubble {
            background: white; padding: 20px 24px; border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); text-align: right;
            position: relative; opacity: 1; transform: scale(1);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .bubble.hidden-msg { opacity: 0; transform: scale(0.95) translateY(10px); pointer-events: none; }

        .assistant-container.victory-move .bubble { text-align: center; padding: 32px; }

        .bubble::after {
            content: ''; position: absolute; bottom: -8px; right: 24px;
            border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid white;
        }

        .assistant-container.victory-move .bubble::after { left: 50%; right: auto; transform: translateX(-50%); }

        .bubble-text { font-size: 1.1rem; font-weight: 600; line-height: 1.5; color: #334155; }

        .mascot-img {
            width: 72px; height: 72px; object-fit: contain;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .assistant-container.victory-move .mascot-img { width: 150px; height: 150px; }

        /* --- BANK CARD --- */
        .bank-card {
            background: white; width: 100%; max-width: 440px; padding: 50px 40px;
            border-radius: 48px; box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            text-align: center; opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .card-exit { transform: scale(0.85) translateY(-50px); opacity: 0 !important; filter: blur(12px); pointer-events: none; }

        .bank-title {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: var(--font-display); font-weight: 800; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 0.2rem; color: var(--secondary); margin-bottom: 32px;
        }

        .upgrade-label { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }

        #price-display {
            display: block; font-family: var(--font-display); font-size: 4rem;
            font-weight: 800; letter-spacing: -2px; margin-bottom: 40px; color: var(--primary);
        }

        .btn-main {
            background: var(--primary); color: white; width: 100%; padding: 20px;
            border-radius: 20px; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            border: none; opacity: 0.9;
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(29, 29, 31, 0.4);
            backdrop-filter: blur(8px); z-index: 2000; display: none;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }

        .modal-card {
            background: white; width: 90%; max-width: 380px; padding: 40px;
            border-radius: 32px; box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center; transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }

        #modal-overlay.active { display: flex; opacity: 1; }
        #modal-overlay.active .modal-card { transform: translateY(0); }

        .btn-confirm { background: var(--text); color: white; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; margin-top: 20px; cursor: pointer; }

        /* --- OVERLAYS --- */
        #transition-screen { position: fixed; inset: 0; background: var(--primary); z-index: 3000; opacity: 1; pointer-events: none; transition: opacity 0.6s ease; }
        #story-overlay { position: fixed; inset: 0; background: white; z-index: 1500; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="transition-screen"></div>

    <div id="story-overlay">
        <div class="text-center max-w-md p-5">
            <img src="../../assets/byte-hello.png" class="w-24 mx-auto mb-8" alt="Byte">
            <h1 class="text-3xl font-extrabold mb-4 tracking-tight">The price isn't a rule.</h1>
            <p class="text-lg text-slate-500 mb-10 font-medium leading-relaxed">Take a look.</p>
            <button onclick="startLevel()" class="bg-[#4546d7] text-white px-10 py-4 rounded-full text-lg font-bold hover:scale-105 transition-all">lets go</button>
        </div>
    </div>

    <header id="header-nav" class="opacity-0">
        <div class="logo-group">
            <img src="../../assets/logo.png" class="app-logo">
            <span class="font-extrabold text-2xl tracking-tighter">ByteLab</span>
        </div>
        <div class="progress-box">
            <div class="progress-rail"><div id="progress-fill-bar" class="progress-fill"></div></div>
            <span id="progress-text-val" class="progress-text">2/5</span>
        </div>
        <button onclick="quit()" class="btn-quit bg-none border-none">Quit</button>
    </header>

    <main id="game-stage" class="w-full flex flex-col items-center justify-center">
        <div id="assistant" class="assistant-container">
            <div id="bubble-node" class="bubble hidden-msg">
                <p class="bubble-text" id="talk-text"></p>
            </div>
            <img id="mascot" src="../../assets/byte-hello.png" class="mascot-img">
        </div>

        <div id="card" class="bank-card">
            <div class="bank-title">National Bank</div>
            <h2 class="upgrade-label">Premium Upgrade</h2>
            <p class="text-slate-400 mb-8 font-medium">Unlock global transfers and gold status.</p>
            <span id="price-display">$999</span>
            <button class="btn-main" id="btn-upgrade">Upgrade Now</button>
        </div>
    </main>

    <div id="modal-overlay">
        <div class="modal-card">
            <p class="font-bold text-lg mb-4">Confirm Upgrade</p>
            <p class="text-slate-500 mb-6">Amount: <span id="modal-price" class="font-black text-black text-xl"></span></p>
            <button class="btn-confirm" id="btn-confirm">Confirm</button>
            <button onclick="closeModal()" class="mt-4 text-slate-400 font-bold block w-full">Cancel</button>
        </div>
    </div>

    <script>
        const BYTE_PC = "assets/byte-pc.png";
        let talkTimeout, hintTimeout, hasWon = false;

        function speak(text, persist = false) {
            clearTimeout(talkTimeout);
            document.getElementById('talk-text').innerText = text;
            document.getElementById('bubble-node').classList.remove('hidden-msg');
            if (!persist) talkTimeout = setTimeout(() => document.getElementById('bubble-node').classList.add('hidden-msg'), 6000);
        }

        window.onload = () => {
            setTimeout(() => document.getElementById('transition-screen').style.opacity = '0', 500);
            document.getElementById('progress-fill-bar').style.width = '40%';
        };

        function startLevel() {
            document.getElementById('story-overlay').style.display = 'none';
            document.getElementById('header-nav').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('assistant').style.opacity = '1';
            document.getElementById('assistant').style.transform = 'translateY(0)';
            document.getElementById('card').style.opacity = '1';
            document.getElementById('card').style.transform = 'translateY(0)';
            speak("Take a look.");
            hintTimeout = setTimeout(() => { if(!hasWon) speak("Need a hint? The modal reads the price directly from the page..."); }, 25000);
        }

        document.getElementById('btn-upgrade').onclick = () => {
            document.getElementById('modal-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('modal-overlay').classList.add('active');
                setTimeout(() => document.getElementById('modal-price').innerText = document.getElementById('price-display').innerText, 50);
            }, 10);
        };

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
        }

        document.getElementById('btn-confirm').onclick = () => {
            const val = document.getElementById('modal-price').innerText.trim();
            if (val !== '$999') handleWin(val);
            else { closeModal(); speak("For real? $999? Use your powers! That's too expensive."); }
        };

        function handleWin(finalPrice) {
            hasWon = true; clearTimeout(hintTimeout); closeModal();

            const card = document.getElementById('card');
            card.innerHTML = `<div class="bank-title">National Bank</div><h2 class="upgrade-label text-green-500">Upgrade Complete</h2><p class="text-slate-400 font-bold mb-4">Status: Gold Member</p><span class="text-lg font-bold text-slate-300">Charged: ${finalPrice}</span>`;
            
            setTimeout(() => {
                card.classList.add('card-exit');
                document.getElementById('assistant').classList.add('victory-move');
                document.getElementById('mascot').src = BYTE_PC;
                speak("Unstoppable. You're starting to think like an architect.", true);
                
                setTimeout(() => {
                    document.getElementById('progress-fill-bar').style.width = '60%';
                    document.getElementById('progress-text-val').innerText = '3/5';
                    setTimeout(() => {
                        document.getElementById('transition-screen').style.opacity = '1';
                        setTimeout(() => window.location.href = "../3/index.html", 800);
                    }, 3000);
                }, 800);
            }, 1200);
        }

        function quit() {
            window.location.href = "../../index.html";
        }
    </script>
</body>
</html>
